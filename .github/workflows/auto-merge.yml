name: Auto-merge on API Tests pass

on:
  workflow_run:
    workflows: ["RESTful API Tests"]
    types: [completed]

jobs:
  auto-merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Find and merge open PR for this branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.payload.workflow_run.head_branch;

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
            });

            if (prs.length === 0) {
              core.info(`No open PR found for branch ${branch} — nothing to merge.`);
              return;
            }

            const pr = prs[0];
            core.info(`Merging PR #${pr.number}: ${pr.title}`);

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'squash',
              commit_title: pr.title,
            });

            core.info(`PR #${pr.number} squash-merged successfully.`);
