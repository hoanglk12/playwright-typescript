name: Lighthouse CI - E-commerce Storefronts

on:
  workflow_dispatch:
    inputs:
      number_of_runs:
        description: 'Lighthouse runs per URL (higher = more stable median)'
        required: false
        default: '3'
        type: choice
        options:
          - '1'
          - '3'
          - '5'

  push:
    branches: [main, master, develop]

  # Uncomment to audit on every PR that touches e-commerce files.
  # Note: 8 storefronts × 3 runs ≈ 20–30 min of execution time.
  # pull_request:
  #   branches: [main, master, develop]
  #   paths:
  #     - 'src/data/ecommerce/**'
  #     - 'lighthouserc.js'

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  LHCI_RUNS: ${{ inputs.number_of_runs || '3' }}

jobs:
  lighthouse-audit:
    name: Lighthouse Audit (E-commerce Storefronts)
    runs-on: ubuntu-latest
    # 8 URLs × 3 runs × ~60 s/run × 2 form factors ≈ 48 min; 90 min provides buffer
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify Chrome installation
        run: |
          echo "Chrome version:"
          google-chrome --version || chromium-browser --version || echo "Chrome not found — LHCI will attempt auto-install"

      - name: Override numberOfRuns if dispatched manually
        if: ${{ inputs.number_of_runs != '' }}
        run: |
          node -e "
            const fs = require('fs');
            const patch = (file) => {
              const patched = fs.readFileSync(file, 'utf8').replace(
                /numberOfRuns:\s*\d+/,
                'numberOfRuns: ${{ env.LHCI_RUNS }}'
              );
              fs.writeFileSync(file, patched);
            };
            patch('lighthouserc.js');
            patch('lighthouserc.mobile.js');
            console.log('numberOfRuns patched to ${{ env.LHCI_RUNS }} in both configs');
          "

      # lhci autorun is NOT used here because it requires a staticDistDir or
      # startServerCommand. We audit live URLs, so the three steps are run
      # explicitly: collect → upload → assert.

      - name: Collect Lighthouse reports
        run: npx lhci collect --config=lighthouserc.js
        env:
          LHCI_NO_ANONYMOUS_USAGE_STATISTICS: 'true'

      - name: Upload reports to filesystem output dir
        # Always runs so reports are available even when assertions fail
        if: always()
        run: npx lhci upload --config=lighthouserc.js
        env:
          LHCI_NO_ANONYMOUS_USAGE_STATISTICS: 'true'

      - name: Assert Lighthouse thresholds
        # Always runs after collect; failures here set job status to failed
        if: always()
        run: npx lhci assert --config=lighthouserc.js

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: lighthouse-reports
          path: |
            lighthouse-reports/
            .lighthouseci/
          retention-days: 30

      - name: Collect Lighthouse reports (mobile)
        if: always()
        run: npx lhci collect --config=lighthouserc.mobile.js
        env:
          LHCI_NO_ANONYMOUS_USAGE_STATISTICS: 'true'

      - name: Upload mobile reports to filesystem output dir
        if: always()
        run: npx lhci upload --config=lighthouserc.mobile.js
        env:
          LHCI_NO_ANONYMOUS_USAGE_STATISTICS: 'true'

      - name: Assert Lighthouse thresholds (mobile)
        if: always()
        run: npx lhci assert --config=lighthouserc.mobile.js

      - name: Upload Lighthouse reports (mobile)
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: lighthouse-reports-mobile
          path: lighthouse-reports-mobile/
          retention-days: 30

      - name: Merge mobile reports into desktop dir for CF Pages deploy
        if: always()
        run: |
          mkdir -p lighthouse-reports/mobile
          cp -r lighthouse-reports-mobile/. lighthouse-reports/mobile/
        continue-on-error: true

      - name: Generate Lighthouse landing page
        if: always()
        run: node scripts/generate-lhci-index.js
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Delete large files before Cloudflare deploy
        if: always()
        run: find lighthouse-reports -type f -size +25M -delete
        continue-on-error: true

      - name: Deploy Lighthouse reports to Cloudflare Pages
        if: always() && hashFiles('lighthouse-reports/index.html') != ''
        id: cf-lighthouse
        continue-on-error: true
        run: |
          npx wrangler@3 pages deploy lighthouse-reports \
            --project-name playwright-lighthouse-reports \
            --branch main \
            --commit-message "Lighthouse ${{ github.ref_name }} run ${{ github.run_id }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Generate job summary
        if: always()
        run: |
          echo "## Lighthouse CI - E-commerce Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Storefronts audited**: 8 (Platypus AU/NZ, Skechers AU/NZ, Vans AU/NZ, Dr. Martens AU/NZ)" >> $GITHUB_STEP_SUMMARY
          echo "- **Runs per URL**: ${{ env.LHCI_RUNS }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Form factors**: Desktop (1350×940, cable) + Mobile (375×667, Slow 4G)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Assertion Thresholds" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Level | Threshold |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Performance | warn | ≥ 50 |" >> $GITHUB_STEP_SUMMARY
          echo "| Accessibility | **error** | ≥ 90 (Google Good) |" >> $GITHUB_STEP_SUMMARY
          echo "| Best Practices | warn | ≥ 90 (Google Good) |" >> $GITHUB_STEP_SUMMARY
          echo "| SEO | warn | ≥ 90 (Google Good) |" >> $GITHUB_STEP_SUMMARY
          echo "| LCP | warn | ≤ 2 500 ms (Google Good) |" >> $GITHUB_STEP_SUMMARY
          echo "| TBT | warn | ≤ 200 ms (INP proxy Good) |" >> $GITHUB_STEP_SUMMARY
          echo "| CLS | warn | ≤ 0.10 (Google Good) |" >> $GITHUB_STEP_SUMMARY
          echo "| FCP | warn | ≤ 1 800 ms (Google Good) |" >> $GITHUB_STEP_SUMMARY
          echo "| image-alt / document-title / html-has-lang | **error** | must pass |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Full HTML and JSON reports uploaded as **lighthouse-reports** artifact (30-day retention)" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 **Lighthouse Report:** https://playwright-lighthouse-reports.pages.dev" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

      - name: Assert result notice
        if: failure()
        run: |
          echo "::error::One or more Lighthouse assertions failed."
          echo "::error::Download the 'lighthouse-reports' artifact and open the HTML reports to identify failing audits."
          echo "::error::Errors (accessibility score < 0.7, missing image-alt/title/lang) must be fixed before merge."
          echo "::error::Warnings indicate regressions to investigate but do not block the build by themselves."
